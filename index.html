<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL THERMAL OSINT // SENSOR FUSION</title>
    <style>
        :root {
            --bg-color: #03060a;
            --panel-bg: #070e17;
            --primary: #00f0ff;
            --primary-dim: rgba(0, 240, 255, 0.3);
            --accent: #ffab00;
            --danger: #ff003c;
            --cold: #0055ff;
            --text-main: #e0f8ff;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-mono);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                linear-gradient(var(--primary-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--primary-dim) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
        }

        .header {
            width: 100%;
            max-width: 1500px; 
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .header h2 { margin: 0; color: var(--primary); font-size: 24px; letter-spacing: 2px; text-shadow: 0 0 8px var(--primary-dim); }
        .sys-time { color: var(--accent); font-size: 14px; margin-top: 4px;}

        .main-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            width: 100%;
            max-width: 1500px; 
            flex-wrap: wrap; 
        }
        
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--primary-dim);
            padding: 20px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.05);
        }
        
        .panel::before, .panel::after {
            content: ''; position: absolute; width: 15px; height: 15px; border-color: var(--primary); border-style: solid;
        }
        .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .panel::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        .scale-panel { display: flex; flex-direction: row; align-items: center; gap: 15px; }
        .scale-labels { display: flex; flex-direction: column; justify-content: space-between; height: 720px; font-weight: bold; font-size: 14px; color: var(--primary); }
        #legendCanvas { width: 20px; height: 720px; border: 1px solid var(--primary); }

        .video-panel { display: flex; flex-direction: column; align-items: center; padding: 10px; flex-grow: 1; max-width: 740px;}
        
        /* Split View Layout */
        .split-view-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 15px;
            align-items: center;
        }

        .optical-wrapper, .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 720px;
            aspect-ratio: 1 / 1;
            border: 1px solid var(--primary);
            background-color: #000;
            overflow: hidden; 
        }

        .optical-wrapper { display: none; } /* Hidden until camera selected */
        
        #opticalVideo {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Naturally mirror optical feed for usability */
        }

        #thermalCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: center center;
        }
        
        .scanlines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 5;
        }

        .feed-label {
            position: absolute;
            top: 5px; left: 5px;
            background: rgba(0,0,0,0.8);
            color: var(--primary);
            padding: 2px 6px;
            font-size: 10px;
            border: 1px solid var(--primary-dim);
            z-index: 20;
            pointer-events: none;
            letter-spacing: 1px;
        }

        /* Readouts and Markers */
        #targetReadout {
            position: absolute; display: none; color: var(--primary); font-size: 14px; font-weight: bold;
            background: rgba(0, 0, 0, 0.85); border: 1px solid var(--primary); padding: 6px 10px;
            pointer-events: none; z-index: 10; text-shadow: 0 0 5px var(--primary); transform: translate(15px, 15px);
        }
        
        .ch-line { position: absolute; background-color: rgba(0, 240, 255, 0.5); pointer-events: none; z-index: 8; display: none; }
        #ch-h { height: 1px; width: 100%; left: 0; }
        #ch-v { width: 1px; height: 100%; top: 0; }

        .track-marker {
            position: absolute; display: none; font-size: 12px; font-weight: bold;
            background: rgba(0, 0, 0, 0.7); padding: 2px 6px; border-radius: 4px;
            pointer-events: none; z-index: 9; transform: translate(-50%, -50%);
            white-space: pre; text-align: center;
        }
        #hotMarker { color: var(--danger); border: 1px solid var(--danger); text-shadow: 0 0 5px var(--danger); }
        #coldMarker { color: var(--cold); border: 1px solid var(--cold); text-shadow: 0 0 5px var(--cold); }

        .uplink-controls { display: flex; width: 100%; max-width: 720px; gap: 15px; margin-top: 15px; }

        .controls-panel { display: flex; flex-direction: column; width: 280px; gap: 15px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; border-bottom: 1px dashed var(--primary-dim); padding-bottom: 10px; }
        .control-group label { font-size: 12px; color: var(--accent); text-transform: uppercase; }
        
        select, button, input[type=range] {
            background-color: rgba(0, 240, 255, 0.05); color: var(--primary); border: 1px solid var(--primary-dim);
            padding: 6px; font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; outline: none;
        }
        select:focus, button:hover { background-color: rgba(0, 240, 255, 0.2); border-color: var(--primary); }
        button { cursor: pointer; font-weight: bold; letter-spacing: 1px; color: var(--bg-color); background-color: var(--primary); transition: all 0.2s; padding: 12px; font-size: 14px; flex-grow: 1; }
        button:hover { background-color: var(--text-main); box-shadow: 0 0 10px var(--primary); }
        
        #btnFullscreen { background-color: transparent; border: 1px solid var(--primary); padding: 4px 8px; font-size: 10px; color: var(--primary); width: auto; margin-bottom: 5px; }
        #btnFullscreen:hover { background-color: var(--primary); color: var(--bg-color); }

        input[type=range] { -webkit-appearance: none; height: 2px; background: var(--primary-dim); margin: 10px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 14px; background: var(--accent); cursor: pointer; border-radius: 0; }
        
        .slider-row { display: flex; align-items: center; justify-content: space-between; }
        .slider-val { width: 50px; text-align: right; color: var(--primary); }
        .checkbox-row { display: flex; align-items: center; gap: 10px; font-size: 12px; cursor: pointer; color: var(--text-main); }
        
        #status { font-size: 12px; color: var(--danger); font-weight: bold; }

        .footer {
            margin-top: 30px; width: 100%; max-width: 1500px; text-align: center; border-top: 1px solid var(--primary-dim);
            padding-top: 10px; font-size: 12px; color: var(--primary-dim); letter-spacing: 3px; text-transform: uppercase;
        }
        .footer span { color: var(--primary); font-weight: bold; }

        @media (max-width: 1300px) {
            .scale-labels { height: 350px; }
            #legendCanvas { height: 350px; }
            .video-wrapper, .optical-wrapper { max-width: 100%; }
            .uplink-controls { flex-direction: column; }
        }

        /* --------------------------------------------------------- */
        /* FULLSCREEN TACTICAL OVERRIDE                              */
        /* --------------------------------------------------------- */
        :fullscreen { overflow: hidden; background-color: #000; padding: 0; }
        ::backdrop { background-color: #000; }
        
        body.is-fullscreen .header,
        body.is-fullscreen .scale-panel,
        body.is-fullscreen .controls-panel,
        body.is-fullscreen .footer,
        body.is-fullscreen .uplink-controls {
            display: none !important;
        }

        body.is-fullscreen .main-container {
            width: 100vw; height: 100vh;
            margin: 0; padding: 0; gap: 0;
        }

        body.is-fullscreen .panel.video-panel {
            width: 100vw; height: 100vh;
            max-width: none; border: none; padding: 0;
            background: #000;
        }

        body.is-fullscreen .split-view-container {
            width: 100%; height: 100%; gap: 0;
        }

        body.is-fullscreen .optical-wrapper,
        body.is-fullscreen .video-wrapper {
            flex-grow: 1; /* Split screen height equally 50/50 */
            max-width: none;
            aspect-ratio: auto;
            border: none; border-bottom: 2px solid var(--primary);
        }

        body.is-fullscreen #btnFullscreen {
            display: block !important; position: fixed;
            top: 10px; right: 10px; z-index: 9999;
            background: rgba(0,0,0,0.8); border: 1px solid var(--primary);
            padding: 10px; font-size: 12px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2>SIGINT // SENSOR FUSION</h2>
            <div id="sysTime" class="sys-time">SYS.TIME: 00:00:00</div>
        </div>
        <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end;">
            <button id="btnFullscreen">[ ENTER FULLSCREEN ]</button>
            <div style="font-size: 10px; color: var(--primary-dim);">UPLINK STATUS</div>
            <div id="status">OFFLINE // AWAITING UPLINK</div>
        </div>
    </div>

    <div class="main-container">
        <div class="panel scale-panel">
            <canvas id="legendCanvas" width="1" height="256"></canvas>
            <div class="scale-labels">
                <span id="lblMax">35.0 °C</span>
                <span id="lblMid">27.5 °C</span>
                <span id="lblMin">20.0 °C</span>
            </div>
        </div>

        <div class="panel video-panel">
            <div class="split-view-container" id="splitView">
                
                <div class="optical-wrapper" id="opticalWrapper">
                    <video id="opticalVideo" autoplay playsinline muted></video>
                    <div class="scanlines"></div>
                    <div class="feed-label">OPTICAL ARRAY</div>
                </div>

                <div class="video-wrapper" id="videoWrapper">
                    <canvas id="thermalCanvas" width="512" height="512"></canvas>
                    <div class="scanlines"></div>
                    <div id="ch-h" class="ch-line"></div>
                    <div id="ch-v" class="ch-line"></div>
                    <div id="targetReadout">TRG: 00.00°</div>
                    <div id="hotMarker" class="track-marker"></div>
                    <div id="coldMarker" class="track-marker"></div>
                    <div class="feed-label">THERMAL ARRAY</div>
                </div>
                
            </div>
            
            <div class="uplink-controls" id="uplinkControls">
                <button id="btnUSB">[ INIT HARDWIRE UPLINK (USB) ]</button>
                <button id="btnBLE">[ INIT WIRELESS UPLINK (BLE) ]</button>
            </div>
        </div>

        <div class="panel controls-panel">
            <div class="control-group">
                <label>OPTICAL CAMERA (SPLIT SCREEN)</label>
                <select id="selCamera">
                    <option value="">-- OPTICAL FEED OFF --</option>
                </select>
            </div>

            <div class="control-group">
                <label>UNIT METRICS</label>
                <select id="selUnit">
                    <option value="C">CELSIUS (°C)</option>
                    <option value="F">FAHRENHEIT (°F)</option>
                </select>
            </div>

            <div class="control-group">
                <label>THERMAL COLOR PALETTE</label>
                <select id="selPalette">
                    <option value="inferno">INFERNO (DEEP PURPLE)</option>
                    <option value="ironbow">IRONBOW (FLIR STANDARD)</option>
                    <option value="jet">THERMAL (JET RAINBOW)</option>
                    <option value="grayscale">WHITE HOT (FLIR)</option>
                </select>
            </div>

            <div class="control-group">
                <label>DSP INTERPOLATION</label>
                <select id="selInterpolation">
                    <option value="2">GPU CUBIC SPLINE (MAX QUALITY)</option>
                    <option value="1">GPU BILINEAR (STANDARD)</option>
                    <option value="0">RAW MATRIX (8x8)</option>
                </select>
            </div>

            <div class="control-group" style="padding-top: 10px;">
                <label class="checkbox-row">
                    <input type="checkbox" id="chkAutoRange" checked> 
                    [ AUTO-CALIBRATE RANGE ]
                </label>
                <label class="checkbox-row" style="margin-top: 5px;">
                    <input type="checkbox" id="chkMirrorX" checked> 
                    [ MIRROR X-AXIS ]
                </label>
                <label class="checkbox-row" style="margin-top: 5px;">
                    <input type="checkbox" id="chkMirrorY"> 
                    [ MIRROR Y-AXIS ]
                </label>
            </div>

            <div class="control-group">
                <label>GLOBAL PEAK RANGE</label>
                <div class="slider-row">
                    <input type="range" id="rngMax" min="-20" max="80" step="1" value="35">
                    <span class="slider-val" id="valMax">35.0</span>
                </div>
            </div>

            <div class="control-group" style="border-bottom: none;">
                <label>GLOBAL FLOOR RANGE</label>
                <div class="slider-row">
                    <input type="range" id="rngMin" min="-20" max="80" step="1" value="20">
                    <span class="slider-val" id="valMin">20.0</span>
                </div>
            </div>
        </div>

        <div class="panel controls-panel">
            <div class="control-group" style="padding-top: 5px;">
                <label class="checkbox-row" style="color: var(--accent);">
                    <input type="checkbox" id="chkTrackExtremes"> 
                    [ ACQUIRE MAX/MIN TARGETS ]
                </label>
            </div>

            <div class="control-group">
                <label>TEMPORAL DENOISING (EMA)</label>
                <div class="slider-row">
                    <input type="range" id="rngDenoise" min="0" max="0.9" step="0.1" value="0.5">
                    <span class="slider-val" id="valDenoise">50%</span>
                </div>
            </div>

            <div class="control-group">
                <label>ISOTHERM OVERRIDE (GPU BLACKOUT)</label>
                <select id="selIsotherm">
                    <option value="none">-- DISABLED --</option>
                    <option value="human">HUMAN / ANIMAL DETECT</option>
                    <option value="elec">WIRE / ELECTRONICS ISO</option>
                    <option value="draft">A/C / DOOR DRAFT LEAK</option>
                    <option value="fridge">FRIDGE SEAL LEAK</option>
                    <option value="manual">MANUAL CLAMP</option>
                </select>
            </div>

            <div class="control-group">
                <label>ISOTHERM PEAK CLAMP</label>
                <div class="slider-row">
                    <input type="range" id="rngIsoMax" min="-20" max="100" step="1" value="38" disabled>
                    <span class="slider-val" id="valIsoMax">38.0</span>
                </div>
            </div>

            <div class="control-group" style="border-bottom: none;">
                <label>ISOTHERM FLOOR CLAMP</label>
                <div class="slider-row">
                    <input type="range" id="rngIsoMin" min="-20" max="100" step="1" value="34" disabled>
                    <span class="slider-val" id="valIsoMin">34.0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        CLASSIFIED DATA STREAM // <span>TeXmExDeX Type Tools</span> // SECURE CONNECTION
    </div>

    <script>
        // DOM Elements
        const btnUSB = document.getElementById('btnUSB'), btnBLE = document.getElementById('btnBLE');
        const btnFullscreen = document.getElementById('btnFullscreen');
        const uplinkControls = document.getElementById('uplinkControls'), statusDiv = document.getElementById('status');
        
        const canvas = document.getElementById('thermalCanvas');
        const legendCanvas = document.getElementById('legendCanvas'), legendCtx = legendCanvas.getContext('2d');
        const sysTime = document.getElementById('sysTime'), videoWrapper = document.getElementById('videoWrapper');
        
        // Optical Elements
        const selCamera = document.getElementById('selCamera');
        const opticalVideo = document.getElementById('opticalVideo');
        const opticalWrapper = document.getElementById('opticalWrapper');

        // Readouts
        const targetReadout = document.getElementById('targetReadout'), chH = document.getElementById('ch-h'), chV = document.getElementById('ch-v');
        const hotMarker = document.getElementById('hotMarker'), coldMarker = document.getElementById('coldMarker');
        
        // Optics UI
        const rngMin = document.getElementById('rngMin'), rngMax = document.getElementById('rngMax');
        const valMin = document.getElementById('valMin'), valMax = document.getElementById('valMax');
        const lblMin = document.getElementById('lblMin'), lblMax = document.getElementById('lblMax'), lblMid = document.getElementById('lblMid');
        const chkAutoRange = document.getElementById('chkAutoRange');
        const chkMirrorX = document.getElementById('chkMirrorX'), chkMirrorY = document.getElementById('chkMirrorY');
        const selPalette = document.getElementById('selPalette'), selUnit = document.getElementById('selUnit'), selInterpolation = document.getElementById('selInterpolation');
        
        // Targeting UI
        const chkTrackExtremes = document.getElementById('chkTrackExtremes');
        const rngDenoise = document.getElementById('rngDenoise'), valDenoise = document.getElementById('valDenoise');
        const selIsotherm = document.getElementById('selIsotherm');
        const rngIsoMin = document.getElementById('rngIsoMin'), rngIsoMax = document.getElementById('rngIsoMax');
        const valIsoMin = document.getElementById('valIsoMin'), valIsoMax = document.getElementById('valIsoMax');

        // State Variables
        let minTemp = 20.0, maxTemp = 35.0;
        let currentFrameTemps = new Float32Array(64);
        let emaBuffer = new Float32Array(64);
        let firstFrame = true;
        let bleBuffer = "";
        
        let gpuPayload = new Uint8Array(64); 
        let activeTargetIndex = -1;
        let mouseRawX = 0, mouseRawY = 0;

        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const UART_TX_CHAR_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; 
        const UART_RX_CHAR_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; 

        if (!navigator.serial) btnUSB.style.display = 'none';
        if (!navigator.bluetooth) btnBLE.style.display = 'none';

        // ---------------------------------------------------------
        // FULLSCREEN TACTICAL OVERRIDE
        // ---------------------------------------------------------
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) { 
                document.documentElement.requestFullscreen().catch(err => { alert(`Fullscreen Error: ${err.message}`); }); 
            } else { 
                document.exitFullscreen(); 
            }
        });
        document.addEventListener('fullscreenchange', () => { 
            if (document.fullscreenElement) {
                btnFullscreen.innerText = "[ EXIT FULLSCREEN ]";
                document.body.classList.add('is-fullscreen');
                
                // If Fullscreen triggers and optical is off, hide the wrapper so thermal maximizes 100%
                if(selCamera.value === "") { opticalWrapper.style.display = 'none'; }
            } else {
                btnFullscreen.innerText = "[ ENTER FULLSCREEN ]";
                document.body.classList.remove('is-fullscreen');
            }
        });

        // ---------------------------------------------------------
        // OPTICAL CAMERA INTEGRATION
        // ---------------------------------------------------------
        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                selCamera.innerHTML = '<option value="">-- OPTICAL FEED OFF --</option>';
                videoDevices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${selCamera.length}`;
                    selCamera.appendChild(option);
                });
            } catch (err) {
                console.warn("Camera access denied or unavailable.");
            }
        }
        
        selCamera.addEventListener('change', async (e) => {
            const deviceId = e.target.value;
            if (opticalVideo.srcObject) {
                opticalVideo.srcObject.getTracks().forEach(track => track.stop());
            }
            if (deviceId) {
                opticalWrapper.style.display = 'block';
                const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: deviceId } } });
                opticalVideo.srcObject = stream;
            } else {
                opticalWrapper.style.display = 'none';
                opticalVideo.srcObject = null;
            }
        });
        
        getCameras();

        // ---------------------------------------------------------
        // WEBGL 2.0 SHADER PIPELINE (Temperature-Space)
        // ---------------------------------------------------------
        const gl = canvas.getContext('webgl2');
        if (!gl) alert('CRITICAL ERROR: WebGL 2.0 is not supported. GPU DSP unavailable.');

        const vsSource = `#version 300 es
            in vec2 a_position;
            out vec2 v_uv;
            void main() {
                v_uv = a_position * 0.5 + 0.5;
                v_uv.y = 1.0 - v_uv.y; 
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        `;

        const fsSource = `#version 300 es
            precision highp float;
            in vec2 v_uv;
            out vec4 outColor;

            uniform sampler2D u_dataTex;
            uniform sampler2D u_palTex;
            uniform int u_interp;
            
            uniform float u_min;
            uniform float u_max;
            uniform int u_iso_enabled;
            uniform float u_iso_min;
            uniform float u_iso_max;

            float w(float x) {
                float a = -0.5; x = abs(x);
                if (x <= 1.0) return (a + 2.0)*x*x*x - (a + 3.0)*x*x + 1.0;
                else if (x < 2.0) return a*x*x*x - 5.0*a*x*x + 8.0*a*x - 4.0*a;
                return 0.0;
            }

            float getBicubic(vec2 uv) {
                vec2 texSize = vec2(8.0, 8.0);
                vec2 p = uv * texSize - 0.5;
                vec2 f = fract(p); vec2 p0 = floor(p) + 0.5;
                float sum = 0.0;
                for(float y = -1.0; y <= 2.0; y++) {
                    for(float x = -1.0; x <= 2.0; x++) {
                        vec2 coord = clamp((p0 + vec2(x, y)) / texSize, 0.0, 1.0);
                        sum += texture(u_dataTex, coord).r * w(x - f.x) * w(y - f.y);
                    }
                }
                return sum;
            }

            void main() {
                float tempNorm;
                if (u_interp == 2) tempNorm = getBicubic(v_uv);
                else tempNorm = texture(u_dataTex, v_uv).r; 
                
                tempNorm = clamp(tempNorm, 0.0, 1.0);

                if (u_iso_enabled == 1) {
                    float trueTemp = mix(u_min, u_max, tempNorm);
                    if (trueTemp < u_iso_min || trueTemp > u_iso_max) {
                        outColor = vec4(0.0, 0.0, 0.0, 1.0); 
                        return;
                    }
                }
                
                outColor = vec4(texture(u_palTex, vec2(tempNorm, 0.5)).rgb, 1.0);
            }
        `;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source); gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(shader)); gl.deleteShader(shader); return null; }
            return shader;
        }

        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(program); gl.useProgram(program);

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const positionLocation = gl.getAttribLocation(program, "a_position");
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        const uInterpLoc = gl.getUniformLocation(program, "u_interp");
        const uDataTexLoc = gl.getUniformLocation(program, "u_dataTex");
        const uPalTexLoc = gl.getUniformLocation(program, "u_palTex");
        
        const uMinLoc = gl.getUniformLocation(program, "u_min"), uMaxLoc = gl.getUniformLocation(program, "u_max");
        const uIsoEnabledLoc = gl.getUniformLocation(program, "u_iso_enabled");
        const uIsoMinLoc = gl.getUniformLocation(program, "u_iso_min"), uIsoMaxLoc = gl.getUniformLocation(program, "u_iso_max");

        const dataTex = gl.createTexture();
        gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, dataTex);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, 8, 8, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, gpuPayload);
        gl.uniform1i(uDataTexLoc, 0);

        const palTex = gl.createTexture();
        gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, palTex);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.uniform1i(uPalTexLoc, 1);

        // ---------------------------------------------------------
        // ISOTHERM TARGETING LOGIC
        // ---------------------------------------------------------
        function convertCToCurrent(c) { return selUnit.value === 'F' ? (c * 9/5) + 32 : c; }

        function updateIsothermUI() {
            const val = selIsotherm.value;
            let iMin = 0, iMax = 100;
            let isManual = (val === 'manual');
            
            rngIsoMin.disabled = !isManual; rngIsoMax.disabled = !isManual;

            if (val === 'human') { iMin = convertCToCurrent(34); iMax = convertCToCurrent(38); }
            else if (val === 'elec') { iMin = convertCToCurrent(45); iMax = convertCToCurrent(80); }
            else if (val === 'draft') { iMin = convertCToCurrent(10); iMax = convertCToCurrent(18); }
            else if (val === 'fridge') { iMin = convertCToCurrent(0); iMax = convertCToCurrent(8); }
            else if (isManual) { iMin = parseFloat(rngIsoMin.value); iMax = parseFloat(rngIsoMax.value); }
            
            if (val !== 'none' && !isManual) { rngIsoMin.value = iMin; rngIsoMax.value = iMax; }
            if (isManual) {
                if(parseFloat(rngIsoMin.value) >= parseFloat(rngIsoMax.value)) {
                    rngIsoMin.value = parseFloat(rngIsoMax.value) - 1; iMin = parseFloat(rngIsoMin.value);
                }
            }

            valIsoMin.innerText = parseFloat(rngIsoMin.value).toFixed(1); valIsoMax.innerText = parseFloat(rngIsoMax.value).toFixed(1);
            
            gl.useProgram(program);
            gl.uniform1i(uIsoEnabledLoc, val === 'none' ? 0 : 1);
            gl.uniform1f(uIsoMinLoc, iMin); gl.uniform1f(uIsoMaxLoc, iMax);
            if(!firstFrame) renderWebGL();
        }

        selIsotherm.addEventListener('change', updateIsothermUI);
        rngIsoMin.addEventListener('input', updateIsothermUI); rngIsoMax.addEventListener('input', updateIsothermUI);

        // ---------------------------------------------------------
        // UI & PALETTES
        // ---------------------------------------------------------
        const PALETTES = {
            inferno: [{ pos: 0.00, color: [0, 0, 4] }, { pos: 0.15, color: [40, 11, 84] }, { pos: 0.35, color: [101, 21, 110] }, { pos: 0.55, color: [190, 40, 80] }, { pos: 0.75, color: [237, 105, 37] }, { pos: 0.90, color: [249, 203, 53] }, { pos: 1.00, color: [252, 255, 164] }],
            ironbow: [{ pos: 0.00, color: [0, 0, 0] }, { pos: 0.15, color: [20, 0, 80] }, { pos: 0.35, color: [130, 0, 120] }, { pos: 0.55, color: [255, 60, 0] }, { pos: 0.75, color: [255, 170, 0] }, { pos: 1.00, color: [255, 255, 255] }],
            jet: [{ pos: 0.00, color: [0, 0, 130] }, { pos: 0.12, color: [0, 0, 255] }, { pos: 0.37, color: [0, 255, 255] }, { pos: 0.62, color: [255, 255, 0] }, { pos: 0.87, color: [255, 0, 0] }, { pos: 1.00, color: [130, 0, 0] }],
            grayscale: [{ pos: 0.00, color: [0, 0, 0] }, { pos: 1.00, color: [255, 255, 255] }]
        };

        function getInterpolatedColor(v, stops) {
            let lower = stops[0], upper = stops[stops.length - 1];
            for (let i = 0; i < stops.length - 1; i++) {
                if (v >= stops[i].pos && v <= stops[i+1].pos) { lower = stops[i]; upper = stops[i+1]; break; }
            }
            let factor = (upper.pos - lower.pos === 0) ? 0 : (v - lower.pos) / (upper.pos - lower.pos);
            return [
                Math.round(lower.color[0] + factor * (upper.color[0] - lower.color[0])),
                Math.round(lower.color[1] + factor * (upper.color[1] - lower.color[1])),
                Math.round(lower.color[2] + factor * (upper.color[2] - lower.color[2]))
            ];
        }

        function updatePalette() {
            const stops = PALETTES[selPalette.value];
            const palArray = new Uint8Array(256 * 3);
            const legendData = legendCtx.createImageData(1, 256);
            for (let i = 0; i < 256; i++) {
                let c = getInterpolatedColor(i / 255.0, stops);
                palArray[i*3] = c[0]; palArray[i*3+1] = c[1]; palArray[i*3+2] = c[2];
                let y = 255 - i;
                legendData.data[y*4] = c[0]; legendData.data[y*4+1] = c[1]; legendData.data[y*4+2] = c[2]; legendData.data[y*4+3] = 255;
            }
            legendCtx.putImageData(legendData, 0, 0);
            gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, palTex);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGB, 256, 1, 0, gl.RGB, gl.UNSIGNED_BYTE, palArray);
            if(!firstFrame) renderWebGL();
        }

        setInterval(() => { sysTime.innerText = "SYS.TIME: " + new Date().toISOString().split('T')[1].split('.')[0] + "Z"; }, 1000);

        function updateScaleUI() {
            if (!chkAutoRange.checked) {
                minTemp = parseFloat(rngMin.value); maxTemp = parseFloat(rngMax.value);
                if (minTemp >= maxTemp) { minTemp = maxTemp - 1; rngMin.value = minTemp; }
            }
            let unitStr = selUnit.value === 'F' ? ' °F' : ' °C';
            valMin.innerText = minTemp.toFixed(1); valMax.innerText = maxTemp.toFixed(1);
            lblMin.innerText = minTemp.toFixed(1) + unitStr; lblMax.innerText = maxTemp.toFixed(1) + unitStr;
            lblMid.innerText = ((minTemp + maxTemp) / 2).toFixed(1) + unitStr;
            
            gl.useProgram(program);
            gl.uniform1f(uMinLoc, minTemp); gl.uniform1f(uMaxLoc, maxTemp);
            if(!firstFrame) renderWebGL();
        }

        rngMin.addEventListener('input', () => { chkAutoRange.checked = false; updateScaleUI(); });
        rngMax.addEventListener('input', () => { chkAutoRange.checked = false; updateScaleUI(); });
        selPalette.addEventListener('change', updatePalette);

        rngDenoise.addEventListener('input', (e) => { valDenoise.innerText = Math.round(e.target.value * 100) + "%"; });

        function updateInterpolation() {
            const mode = parseInt(selInterpolation.value);
            gl.useProgram(program); gl.uniform1i(uInterpLoc, mode);
            gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, dataTex);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, mode === 1 ? gl.LINEAR : gl.NEAREST);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, mode === 1 ? gl.LINEAR : gl.NEAREST);
            if(!firstFrame) renderWebGL();
        }
        selInterpolation.addEventListener('change', updateInterpolation);

        selUnit.addEventListener('change', (e) => {
            let isF = e.target.value === 'F';
            let newMin = isF ? (minTemp * 9/5) + 32 : (minTemp - 32) * 5/9;
            let newMax = isF ? (maxTemp * 9/5) + 32 : (maxTemp - 32) * 5/9;
            rngMin.min = isF ? -4 : -20; rngMin.max = isF ? 176 : 80;
            rngMax.min = isF ? -4 : -20; rngMax.max = isF ? 176 : 80;
            rngMin.value = newMin; rngMax.value = newMax;
            minTemp = newMin; maxTemp = newMax;
            
            rngIsoMin.min = isF ? -4 : -20; rngIsoMin.max = isF ? 212 : 100;
            rngIsoMax.min = isF ? -4 : -20; rngIsoMax.max = isF ? 212 : 100;
            updateIsothermUI(); updateScaleUI();
        });

        // ---------------------------------------------------------
        // CSS TRANSFORM & TARGETING
        // ---------------------------------------------------------
        function updateTransforms() {
            let sx = chkMirrorX.checked ? -1 : 1;
            let sy = chkMirrorY.checked ? -1 : 1;
            canvas.style.transform = `scale(${sx}, ${sy})`;
            if(!firstFrame) renderWebGL();
        }
        chkMirrorX.addEventListener('change', updateTransforms);
        chkMirrorY.addEventListener('change', updateTransforms);

        function calculateIndexFromMouse(x, y, rect) {
            let mappedX = chkMirrorX.checked ? rect.width - x : x;
            let mappedY = chkMirrorY.checked ? rect.height - y : y;
            let pixelX = Math.max(0, Math.min(7, Math.floor((mappedX / rect.width) * 8)));
            let pixelY = Math.max(0, Math.min(7, Math.floor((mappedY / rect.height) * 8)));
            return (pixelY * 8) + pixelX;
        }

        function updateHoverState(e) {
            const rect = videoWrapper.getBoundingClientRect();
            mouseRawX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            mouseRawY = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            if(mouseRawX < 0 || mouseRawX > rect.width || mouseRawY < 0 || mouseRawY > rect.height) { hideReadout(); return; }

            chV.style.left = mouseRawX + 'px'; chH.style.top = mouseRawY + 'px';
            chV.style.display = 'block'; chH.style.display = 'block';
            targetReadout.style.display = 'block';
            targetReadout.style.left = mouseRawX + 'px'; targetReadout.style.top = mouseRawY + 'px';
            
            activeTargetIndex = calculateIndexFromMouse(mouseRawX, mouseRawY, rect);
        }

        videoWrapper.addEventListener('mousemove', updateHoverState);
        videoWrapper.addEventListener('touchmove', (e) => { e.preventDefault(); updateHoverState(e); }, {passive: false});
        
        function hideReadout() {
            chV.style.display = 'none'; chH.style.display = 'none'; targetReadout.style.display = 'none';
            activeTargetIndex = -1;
        }
        videoWrapper.addEventListener('mouseleave', hideReadout);
        videoWrapper.addEventListener('touchend', hideReadout);

        function updateTrackingMarkers() {
            if (!chkTrackExtremes.checked) {
                hotMarker.style.display = 'none'; coldMarker.style.display = 'none'; return;
            }
            let maxT = -Infinity, minT = Infinity;
            let maxIdx = 0, minIdx = 0;
            
            for (let i = 0; i < 64; i++) {
                if (currentFrameTemps[i] > maxT) { maxT = currentFrameTemps[i]; maxIdx = i; }
                if (currentFrameTemps[i] < minT) { minT = currentFrameTemps[i]; minIdx = i; }
            }

            const rect = videoWrapper.getBoundingClientRect();
            let unitStr = selUnit.value;
            
            const applyMarker = (marker, idx, temp, label) => {
                let px = idx % 8; let py = Math.floor(idx / 8);
                let unmappedX = (px + 0.5) * (rect.width / 8);
                let unmappedY = (py + 0.5) * (rect.height / 8);
                
                let visualX = chkMirrorX.checked ? rect.width - unmappedX : unmappedX;
                let visualY = chkMirrorY.checked ? rect.height - unmappedY : unmappedY;
                
                marker.style.left = visualX + 'px'; marker.style.top = visualY + 'px';
                marker.innerText = `[${label}]\n${temp.toFixed(1)}°${unitStr}`;
                marker.style.display = 'block';
            };

            applyMarker(hotMarker, maxIdx, maxT, '+');
            applyMarker(coldMarker, minIdx, minT, '-');
        }

        // ---------------------------------------------------------
        // RENDER PIPELINE
        // ---------------------------------------------------------
        function renderWebGL() {
            if (firstFrame) return;

            for (let i = 0; i < 64; i++) {
                let temp = currentFrameTemps[i];
                let range = maxTemp - minTemp;
                let norm = (range <= 0) ? 0 : Math.max(0, Math.min(1, (temp - minTemp) / range));
                gpuPayload[i] = Math.round(norm * 255);
            }

            gl.useProgram(program);
            gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, dataTex);
            gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, 8, 8, gl.LUMINANCE, gl.UNSIGNED_BYTE, gpuPayload);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            if (activeTargetIndex !== -1) {
                let targetTemp = currentFrameTemps[activeTargetIndex];
                let px = activeTargetIndex % 8; let py = Math.floor(activeTargetIndex / 8);
                targetReadout.innerText = `TRG: ${targetTemp.toFixed(2)}°${selUnit.value} \n[X:${px} Y:${py}]`;
            }
            updateTrackingMarkers();
        }

        function processThermalData(csvString) {
            const values = csvString.split(',');
            if (values.length !== 64) return; 

            const unit = selUnit.value;
            let rawTemps = [];
            for (let i = 0; i < 64; i++) {
                let t = parseFloat(values[i]);
                if (!isNaN(t)) {
                    if (unit === 'F') { t = (t * 9/5) + 32; }
                    rawTemps.push(t);
                }
            }
            if (rawTemps.length !== 64) return;
            
            let alpha = 1.0 - parseFloat(rngDenoise.value);
            for (let i = 0; i < 64; i++) {
                if (firstFrame) { emaBuffer[i] = rawTemps[i]; } 
                else { emaBuffer[i] = (alpha * rawTemps[i]) + ((1 - alpha) * emaBuffer[i]); }
            }
            firstFrame = false;
            currentFrameTemps.set(emaBuffer);

            if (chkAutoRange.checked) {
                let currentMin = Math.min(...currentFrameTemps); let currentMax = Math.max(...currentFrameTemps);
                if ((currentMax - currentMin) < 3.0) { currentMax += 1.5; currentMin -= 1.5; }
                minTemp = minTemp * 0.9 + currentMin * 0.1; maxTemp = maxTemp * 0.9 + currentMax * 0.1;
                rngMin.value = minTemp; rngMax.value = maxTemp;
                updateScaleUI(); 
            } else {
                renderWebGL();
            }
        }

        // ---------------------------------------------------------
        // UPLINK NEGOTIATION
        // ---------------------------------------------------------
        async function connectUSB() {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                statusDiv.innerText = "ONLINE // USB HARDWIRE ESTABLISHED"; statusDiv.style.color = "var(--primary)";
                uplinkControls.style.display = "none";
                const textDecoder = new TextDecoderStream(); port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader(); let buffer = "";
                while (true) {
                    const { value, done } = await reader.read(); if (done) { reader.releaseLock(); break; }
                    buffer += value; let lines = buffer.split('\n');
                    for (let i = 0; i < lines.length - 1; i++) {
                        let line = lines[i].trim(); if (line.length > 0) { processThermalData(line); }
                    }
                    buffer = lines[lines.length - 1];
                }
            } catch (error) { statusDiv.innerText = "USB ERROR // " + error.message; statusDiv.style.color = "var(--danger)"; }
        }

        async function connectBLE() {
            try {
                statusDiv.innerText = "SCANNING RADIO FREQUENCIES..."; statusDiv.style.color = "var(--accent)";
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [UART_SERVICE_UUID] }], optionalServices: [UART_SERVICE_UUID] });
                device.addEventListener('gattserverdisconnected', () => {
                    statusDiv.innerText = "WARNING // WIRELESS UPLINK LOST"; statusDiv.style.color = "var(--danger)"; uplinkControls.style.display = "flex";
                });
                const server = await device.gatt.connect(); statusDiv.innerText = "NEGOTIATING GATT TABLE...";
                await new Promise(resolve => setTimeout(resolve, 500));
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                const rxChar = await service.getCharacteristic(UART_RX_CHAR_UUID); const txChar = await service.getCharacteristic(UART_TX_CHAR_UUID);
                await rxChar.startNotifications(); rxChar.addEventListener('characteristicvaluechanged', handleBLEData);
                statusDiv.innerText = "AUTHORIZING SECURE STREAM..."; let encoder = new TextEncoder();
                await txChar.writeValueWithoutResponse(encoder.encode("START\n"));
                statusDiv.innerText = "ONLINE // BLE WIRELESS ESTABLISHED"; statusDiv.style.color = "var(--primary)";
                uplinkControls.style.display = "none";
            } catch (error) { statusDiv.innerText = "BLE ERROR // " + error.message; statusDiv.style.color = "var(--danger)"; }
        }

        function handleBLEData(event) {
            let chunk = new TextDecoder().decode(event.target.value); bleBuffer += chunk; let lines = bleBuffer.split('\n');
            if (lines.length === 1 && bleBuffer.length > 500) {
                statusDiv.innerText = `MTU ERROR // OVERFLOW (${bleBuffer.length} BYTES)`; statusDiv.style.color = "var(--accent)"; bleBuffer = ""; return;
            }
            for (let i = 0; i < lines.length - 1; i++) {
                let line = lines[i].trim(); if (line.length > 0) { processThermalData(line); }
            }
            bleBuffer = lines[lines.length - 1]; 
        }

        updatePalette(); updateInterpolation(); updateIsothermUI(); updateScaleUI();
        btnUSB.addEventListener('click', connectUSB); btnBLE.addEventListener('click', connectBLE);
    </script>
